name: Eonix OS Tests
on:
  workflow_dispatch:

jobs:
  build-c:
    name: Build & Test C Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang

      - name: Build scheduler simulator
        run: |
          cd eonix-core/scheduler
          if [ -f Makefile ]; then make; fi

      - name: Run scheduler simulator
        run: |
          cd eonix-core/scheduler
          if [ -f simulator ]; then ./simulator --algo all --input processes.csv; fi

      - name: Build memory manager simulator
        run: |
          cd eonix-core/memory
          gcc -O2 -Wall -Wextra -std=c11 -o memory_sim memory_manager.c -lm

      - name: Run memory manager simulator
        run: |
          cd eonix-core/memory
          if [ -f memory_sim ]; then ./memory_sim; fi

      # Kernel module build is handled by test-deadlock-module job
      - name: Verify deadlock module source exists
        run: test -f eonix-core/deadlock/rag_monitor.c && echo "Deadlock module source OK"

  build-rust:
    name: Build Rust Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Build eonix-silicon
        run: |
          cd eonix-silicon
          if [ -f Cargo.toml ]; then cargo build; fi

      - name: Build IPC broker
        run: |
          cd eonix-core/ipc
          if [ -f Cargo.toml ]; then cargo build; fi

  test-rust-silicon:
    name: Test Rust — Silicon HAL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Run eonix-silicon tests
        run: |
          cd eonix-silicon
          cargo test --all -- --nocapture

  test-rust-ipc:
    name: Test Rust — IPC Broker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Run IPC broker tests
        run: |
          cd eonix-core/ipc
          cargo test --all -- --nocapture

  test-python:
    name: Test Python Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest psutil scikit-learn

      - name: Run tests
        run: |
          if [ -d tests ] && ls tests/test_*.py 1>/dev/null 2>&1; then
            pytest tests/ -v --ignore=tests/test_integration_month5.py --ignore=tests/test_integration_month6.py --ignore=tests/test_integration_month7.py
          else
            echo "No tests found yet — skipping"
          fi

  test-python-memory:
    name: Test Python — Page Replacement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run page replacement tests
        run: pytest eonix-core/memory/page_replacement.py -v

  test-branding:
    name: Test Branding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run branding tests
        run: python3 -m pytest eonix-shell/branding.py -v

  test-installer:
    name: Test Installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Validate installer syntax
        run: bash -n install/eonix-install.sh

      - name: Run installer dry mode (isolated)
        run: bash install/eonix-install.sh --dev
        env:
          HOME: /tmp/eonix-test-home
          CI: true

      - name: Idempotence check
        run: bash install/eonix-install.sh --dev
        env:
          HOME: /tmp/eonix-test-home
          CI: true

  build-scheduler-sim:
    name: Build & Run Scheduler Simulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build simulator
        run: |
          cd eonix-core/scheduler
          gcc -O2 -Wall -Wextra -std=c11 -o simulator simulator.c -lm

      - name: Run all scheduling algorithms
        run: |
          cd eonix-core/scheduler
          ./simulator --algo all --input processes.csv

      - name: Verify JSON output
        run: |
          cd eonix-core/scheduler
          test -f results/scheduler_results.json && echo "JSON export OK"

  test-feature-engineer:
    name: Test Feature Engineer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow pytest

      - name: Run feature engineer tests
        run: python -m pytest eonix-core/scheduler/feature_engineer.py -v

  test-deadlock-module:
    name: Build & Test Deadlock Module
    runs-on: ubuntu-latest
    env:
      MODULE_BUILT: '0'
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install kernel headers and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential
          sudo apt-get install -y linux-headers-$(uname -r) || sudo apt-get install -y linux-headers-generic

      - name: Build deadlock kernel module
        run: |
          cd eonix-core/deadlock
          if [ -d "/lib/modules/$(uname -r)/build" ]; then
            make KBUILD_MODPOST_WARN=1
            echo "MODULE_BUILT=1" >> "$GITHUB_ENV"
          else
            echo "::warning::Kernel headers for $(uname -r) are unavailable; skipping .ko build on hosted runner"
          fi

      - name: Verify module built
        if: env.MODULE_BUILT == '1'
        run: |
          test -f eonix-core/deadlock/eonix_deadlock.ko
          modinfo eonix-core/deadlock/eonix_deadlock.ko
          echo "Module build verified OK"

      - name: Build test programs
        run: |
          cd eonix-core/deadlock
          gcc -O2 -Wall -o tests/stress_test tests/stress_test.c
          gcc -O2 -Wall -o tests/edge_cases tests/edge_cases.c
          echo "Test programs compiled OK"

      - name: Upload module and test artifacts
        if: env.MODULE_BUILT == '1'
        uses: actions/upload-artifact@v4.6.0
        with:
          name: deadlock-module
          path: |
            eonix-core/deadlock/eonix_deadlock.ko
            eonix-core/deadlock/results/

      - name: Note skipped kernel module build
        if: env.MODULE_BUILT != '1'
        run: echo "Kernel module build skipped due to missing runner headers; userspace deadlock tests still compile."

      - name: Build trigger test programs
        run: |
          cd eonix-core/deadlock
          gcc -O2 -Wall -pthread -o tests/trigger_deadlock tests/trigger_deadlock.c
          gcc -O2 -Wall -pthread -o tests/trigger_deadlock_3way tests/trigger_deadlock_3way.c
          echo "Test programs compiled OK"

  build-ebpf-security:
    name: Build eBPF Security Monitor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev

      - name: Generate or verify vmlinux.h
        run: |
          cd eonix-core/security
          if bpftool btf dump file /sys/kernel/btf/vmlinux format c > /tmp/vmlinux_gen.h 2>/dev/null; then
            mv /tmp/vmlinux_gen.h vmlinux.h
            echo "vmlinux.h generated from live BTF"
          else
            echo "Using committed minimal vmlinux.h stub"
            test -f vmlinux.h && echo "vmlinux.h exists ($(wc -l < vmlinux.h) lines)"
          fi

      - name: Build BPF object
        run: |
          cd eonix-core/security
          clang -O2 -g -target bpf -D__TARGET_ARCH_x86 -c syscall_monitor.bpf.c -o syscall_monitor.bpf.o
          test -f syscall_monitor.bpf.o && echo "BPF object built OK"

      - name: Build userspace loader
        run: |
          cd eonix-core/security
          gcc -O2 -Wall -Wextra -o syscall_monitor syscall_monitor.c -lbpf -lelf -lz
          test -f syscall_monitor && echo "Userspace loader built OK"

      - name: Verify both binaries
        run: |
          ls -la eonix-core/security/syscall_monitor.bpf.o
          ls -la eonix-core/security/syscall_monitor
          echo "Both binaries verified OK"

  test-security-python:
    name: Test Security — Anomaly Detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn pandas numpy joblib pytest

      - name: Train anomaly detection model
        run: |
          cd eonix-core/security
          python3 anomaly_detector.py --train

      - name: Run anomaly detector tests
        run: |
          cd eonix-core/security
          python3 -m pytest anomaly_detector.py -v

  test-security-pipeline:
    name: Test Security — Pipeline & Fingerprinter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn pandas numpy joblib watchdog pytest

      - name: Run behavioral fingerprinter tests
        run: |
          cd eonix-core/security
          python3 -m pytest behavioral_fingerprint.py -v

      - name: Run security pipeline tests
        run: |
          cd eonix-core/security
          python3 -m pytest security_pipeline.py -v

  test-scheduler-ml:
    name: Test Scheduler ML + Mind
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lightgbm optuna onnxmltools onnxruntime skl2onnx pandas pyarrow numpy psutil pytest

      - name: Run scheduler trainer tests
        run: python3 -m pytest eonix-core/scheduler/train_scheduler.py -v

      - name: Run auto-retrainer tests
        run: python3 -m pytest eonix-core/scheduler/auto_retrain.py -v

      - name: Run EONIX mind tests
        run: python3 -m pytest eonix-mind/mind_v1.py -v

  test-context-agent:
    name: Test ContextAgent + System Reader
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install watchdog chromadb fastapi uvicorn pytest httpx psutil

      - name: Run ContextAgent tests
        run: python3 -m pytest eonix-cortex/context-agent/agent.py -v

      - name: Run system reader tests
        run: python3 -m pytest eonix-mind/system_reader.py -v

  test-goal-engine:
    name: Test GoalEngine + Mind Memory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install chromadb sentence-transformers fastapi uvicorn pytest httpx

      - name: Run GoalEngine tests
        run: python3 -m pytest eonix-cortex/goal-engine/engine.py -v

      - name: Run MIND memory tests
        run: python3 -m pytest eonix-mind/memory.py -v

  test-resource-agent:
    name: Test ResourceAgent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psutil sentence-transformers chromadb fastapi uvicorn pytest httpx

      - name: Run ResourceAgent tests
        run: python3 -m pytest eonix-cortex/resource-agent/agent.py -v

  test-mind-v2:
    name: Test MIND v2 + Proactive
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install faster-whisper llama-cpp-python kokoro chromadb psutil pytest httpx

      - name: Run ProactiveMonitor tests
        run: python3 -m pytest eonix-mind/proactive_monitor.py -v

      - name: Run MIND v2 tests
        run: python3 -m pytest eonix-mind/mind_v2.py -v

  test-sync-daemon:
    name: Test SyncDaemon + StateStore + Voice
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install zeroconf aiohttp fastapi uvicorn pytest pytest-asyncio httpx psutil

      - name: Run SyncDaemon tests (includes /sync/voice)
        run: python3 -m pytest eonix-sync/sync_daemon.py -v

      - name: Run StateStore tests
        run: python3 -m pytest eonix-sync/state_store.py -v

  test-hub:
    name: Test Eonix Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn aiohttp websockets pytest pytest-asyncio httpx

      - name: Run hub tests
        run: python3 -m pytest eonix-hub/hub_server.py -v

  test-shell:
    name: Test EonixShell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install prompt_toolkit psutil httpx pytest llama-cpp-python sentence-transformers

      - name: Run NL interpreter tests
        run: python3 -m pytest eonix-shell/nl_interpreter.py -v

      - name: Run shell tests
        run: python3 -m pytest eonix-shell/shell.py -v

  test-integration-month5:
    name: Test Integration Month 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn aiohttp websockets pytest pytest-asyncio httpx psutil

      - name: Start full stack (services only)
        run: |
          EONIX_START_NO_MIND=1 bash start_eonix.sh
          sleep 5

      - name: Run integration tests
        run: python3 -m pytest tests/test_integration_month5.py -v

  test-integration-month6:
    name: Test Integration Month 6
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn aiohttp websockets pytest pytest-asyncio httpx psutil prompt_toolkit

      - name: Start full stack (services only)
        run: |
          EONIX_START_NO_MIND=1 bash start_eonix.sh
          sleep 5

      - name: Run Month 6 integration tests
        run: python3 -m pytest tests/test_integration_month6.py -v

  test-integration-month7:
    name: Test Integration Month 7
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn aiohttp websockets pytest pytest-asyncio httpx psutil numpy

      - name: Start full stack (services only)
        run: |
          EONIX_START_NO_MIND=1 bash start_eonix.sh
          sleep 5

      - name: Run Month 7 integration tests
        run: python3 -m pytest tests/test_integration_month7.py -v

  test-integration-month9:
    name: Test Integration Month 9
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn aiohttp websockets pytest pytest-asyncio httpx psutil \
            numpy scikit-learn lightgbm onnxruntime chromadb sentence-transformers requests \
            zeroconf prompt_toolkit pyarrow

      - name: Run Month 9 integration tests
        env:
          EONIX_START_SMOKE: '1'
        run: python3 -m pytest tests/test_integration_month9.py -v

  test-desktop:
    name: Test Desktop (GTK headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y xvfb \
            python3-gi python3-gi-cairo \
            gir1.2-gtk-4.0 libgtk-4-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest httpx psutil

      - name: Run desktop tests (headless)
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          sleep 2
          DISPLAY=:99 python3 -m pytest \
            eonix-desktop/desktop.py \
            eonix-desktop/settings.py \
            eonix-desktop/memory_widget.py \
            eonix-desktop/window_manager.py \
            eonix-desktop/session_manager.py -v

  test-iso-scripts:
    name: Test ISO Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Shell syntax check
        run: |
          bash -n iso/build_base.sh
          bash -n iso/chroot_setup.sh
          bash -n iso/grub_config.sh

      - name: Run ISO unit tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          python -m pytest iso/test_iso_build.py -v

  test-iso-assembly:
    name: Test ISO Assembly Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Shell syntax check
        run: |
          bash -n iso/build_squashfs.sh
          bash -n iso/build_iso.sh

      - name: Run ISO unit tests
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          python -m pytest iso/test_iso_build.py -v

  build-iso-full:
    name: Build ISO Full (v1.0.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL \
            /usr/local/.ghcup /usr/share/swift /usr/local/graalvm \
            /usr/local/share/powershell /usr/local/share/chromium 2>/dev/null || true
          sudo apt-get remove -y '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' \
            'php.*' '^mongodb-.*' google-chrome-stable firefox 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean
          sudo docker system prune -a -f 2>/dev/null || true
          echo "=== After cleanup ==="
          df -h /

      - name: Install ISO build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y debootstrap squashfs-tools \
            xorriso grub-pc-bin grub-efi-amd64-bin mtools dosfstools isolinux

      - name: Run full ISO build
        run: |
          sudo env RUN_FULL_BUILD=1 SKIP_CUMULATIVE_TESTS=1 BUILD_ROOT=/root/eonix-iso-build bash iso/codespaces_build.sh
          sudo env CHROOT=/root/eonix-iso-build/chroot bash iso/install_eonix_into_chroot.sh
          sudo env BUILD_ROOT=/root/eonix-iso-build bash iso/build_squashfs.sh
          sudo env BUILD_ROOT=/root/eonix-iso-build ISO_PATH=/root/eonix-iso-build/eonix-os-1.0.0.iso VOLUME_ID=EONIX_OS_1_0_0 bash iso/build_iso.sh
          sudo chown -R $USER:$USER /root/eonix-iso-build
          sudo chmod 755 /root

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: eonix-os-1.0.0.iso
          path: |
            /root/eonix-iso-build/eonix-os-1.0.0.iso
            /root/eonix-iso-build/eonix-os-1.0.0.iso.sha256
