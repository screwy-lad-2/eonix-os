name: Eonix OS Tests
on: [push, pull_request]

jobs:
  build-c:
    name: Build & Test C Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang

      - name: Build scheduler simulator
        run: |
          cd eonix-core/scheduler
          if [ -f Makefile ]; then make; fi

      - name: Run scheduler simulator
        run: |
          cd eonix-core/scheduler
          if [ -f simulator ]; then ./simulator --algo all --input processes.csv; fi

      - name: Build memory manager simulator
        run: |
          cd eonix-core/memory
          gcc -O2 -Wall -Wextra -std=c11 -o memory_sim memory_manager.c -lm

      - name: Run memory manager simulator
        run: |
          cd eonix-core/memory
          if [ -f memory_sim ]; then ./memory_sim; fi

      # Kernel module build is handled by test-deadlock-module job
      - name: Verify deadlock module source exists
        run: test -f eonix-core/deadlock/rag_monitor.c && echo "Deadlock module source OK"

  build-rust:
    name: Build Rust Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Build eonix-silicon
        run: |
          cd eonix-silicon
          if [ -f Cargo.toml ]; then cargo build; fi

      - name: Build IPC broker
        run: |
          cd eonix-core/ipc
          if [ -f Cargo.toml ]; then cargo build; fi

  test-rust-silicon:
    name: Test Rust — Silicon HAL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Run eonix-silicon tests
        run: |
          cd eonix-silicon
          cargo test --all -- --nocapture

  test-rust-ipc:
    name: Test Rust — IPC Broker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Run IPC broker tests
        run: |
          cd eonix-core/ipc
          cargo test --all -- --nocapture

  test-python:
    name: Test Python Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest psutil scikit-learn

      - name: Run tests
        run: |
          if [ -d tests ] && ls tests/test_*.py 1>/dev/null 2>&1; then
            pytest tests/ -v
          else
            echo "No tests found yet — skipping"
          fi

  test-python-memory:
    name: Test Python — Page Replacement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run page replacement tests
        run: pytest eonix-core/memory/page_replacement.py -v

  build-scheduler-sim:
    name: Build & Run Scheduler Simulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build simulator
        run: |
          cd eonix-core/scheduler
          gcc -O2 -Wall -Wextra -std=c11 -o simulator simulator.c -lm

      - name: Run all scheduling algorithms
        run: |
          cd eonix-core/scheduler
          ./simulator --algo all --input processes.csv

      - name: Verify JSON output
        run: |
          cd eonix-core/scheduler
          test -f results/scheduler_results.json && echo "JSON export OK"

  test-feature-engineer:
    name: Test Feature Engineer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow pytest

      - name: Run feature engineer tests
        run: python -m pytest eonix-core/scheduler/feature_engineer.py -v

  test-deadlock-module:
    name: Build & Test Deadlock Module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install kernel headers and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-$(uname -r)

      - name: Build deadlock kernel module
        run: |
          cd eonix-core/deadlock
          make KBUILD_MODPOST_WARN=1

      - name: Verify module built
        run: |
          test -f eonix-core/deadlock/eonix_deadlock.ko
          modinfo eonix-core/deadlock/eonix_deadlock.ko
          echo "Module build verified OK"

      - name: Build test programs
        run: |
          cd eonix-core/deadlock
          gcc -O2 -Wall -o tests/stress_test tests/stress_test.c
          gcc -O2 -Wall -o tests/edge_cases tests/edge_cases.c
          echo "Test programs compiled OK"

      - name: Upload module and test artifacts
        uses: actions/upload-artifact@v4.6.0
        with:
          name: deadlock-module
          path: |
            eonix-core/deadlock/eonix_deadlock.ko
            eonix-core/deadlock/results/

      - name: Build trigger test programs
        run: |
          cd eonix-core/deadlock
          gcc -O2 -Wall -pthread -o tests/trigger_deadlock tests/trigger_deadlock.c
          gcc -O2 -Wall -pthread -o tests/trigger_deadlock_3way tests/trigger_deadlock_3way.c
          echo "Test programs compiled OK"

  build-ebpf-security:
    name: Build eBPF Security Monitor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install eBPF toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev libelf-dev zlib1g-dev

      - name: Generate or verify vmlinux.h
        run: |
          cd eonix-core/security
          if bpftool btf dump file /sys/kernel/btf/vmlinux format c > /tmp/vmlinux_gen.h 2>/dev/null; then
            mv /tmp/vmlinux_gen.h vmlinux.h
            echo "vmlinux.h generated from live BTF"
          else
            echo "Using committed minimal vmlinux.h stub"
            test -f vmlinux.h && echo "vmlinux.h exists ($(wc -l < vmlinux.h) lines)"
          fi

      - name: Build BPF object
        run: |
          cd eonix-core/security
          clang -O2 -g -target bpf -D__TARGET_ARCH_x86 -c syscall_monitor.bpf.c -o syscall_monitor.bpf.o
          test -f syscall_monitor.bpf.o && echo "BPF object built OK"

      - name: Build userspace loader
        run: |
          cd eonix-core/security
          gcc -O2 -Wall -Wextra -o syscall_monitor syscall_monitor.c -lbpf -lelf -lz
          test -f syscall_monitor && echo "Userspace loader built OK"

      - name: Verify both binaries
        run: |
          ls -la eonix-core/security/syscall_monitor.bpf.o
          ls -la eonix-core/security/syscall_monitor
          echo "Both binaries verified OK"

  test-security-python:
    name: Test Security — Anomaly Detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn pandas numpy joblib pytest

      - name: Train anomaly detection model
        run: |
          cd eonix-core/security
          python3 anomaly_detector.py --train

      - name: Run anomaly detector tests
        run: |
          cd eonix-core/security
          python3 -m pytest anomaly_detector.py -v
