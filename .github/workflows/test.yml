name: Eonix OS Tests
on: [push, pull_request]

jobs:
  build-c:
    name: Build & Test C Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang

      - name: Build scheduler simulator
        run: |
          cd eonix-core/scheduler
          if [ -f Makefile ]; then make; fi

      - name: Run scheduler simulator
        run: |
          cd eonix-core/scheduler
          if [ -f simulator ]; then ./simulator; fi

      - name: Build memory manager simulator
        run: |
          cd eonix-core/memory
          gcc -O2 -Wall -Wextra -std=c11 -o memory_sim memory_manager.c -lm

      - name: Run memory manager simulator
        run: |
          cd eonix-core/memory
          if [ -f memory_sim ]; then ./memory_sim; fi

      # Note: Kernel module (deadlock/rag_monitor.c) requires matching
      # kernel headers and cannot be built in standard CI.
      # Build & test kernel modules locally in QEMU instead.
      - name: Verify deadlock module compiles (syntax check only)
        run: |
          cd eonix-core/deadlock
          gcc -fsyntax-only -include /dev/null rag_monitor.c 2>&1 || echo "Kernel module syntax check skipped (requires kernel headers)"

  build-rust:
    name: Build Rust Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Build eonix-silicon
        run: |
          cd eonix-silicon
          if [ -f Cargo.toml ]; then cargo build; fi

      - name: Build IPC broker
        run: |
          cd eonix-core/ipc
          if [ -f Cargo.toml ]; then cargo build; fi

  test-rust-silicon:
    name: Test Rust — Silicon HAL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Run eonix-silicon tests
        run: |
          cd eonix-silicon
          cargo test --all -- --nocapture

  test-rust-ipc:
    name: Test Rust — IPC Broker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Run IPC broker tests
        run: |
          cd eonix-core/ipc
          cargo test --all -- --nocapture

  test-python:
    name: Test Python Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest psutil scikit-learn

      - name: Run tests
        run: |
          if [ -d tests ] && ls tests/test_*.py 1>/dev/null 2>&1; then
            pytest tests/ -v
          else
            echo "No tests found yet — skipping"
          fi

  test-python-memory:
    name: Test Python — Page Replacement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run page replacement tests
        run: pytest eonix-core/memory/page_replacement.py -v
